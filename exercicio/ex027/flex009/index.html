<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex-box</title>
    <style>
        div.container {
            background-color: rgb(212, 104, 64);

            display: flex;
            flex-flow: row nowrap;
        }

        div.item {
            background-color: rgb(196, 250, 255);
            border: 1px solid black;
            text-align: center;
            flex-basis: 150px;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item">conteudo maior</div>
        <div class="item">C</div>
        <div class="item">conteudo maior ainda</div>
        <div class="item">E</div>
        <div class="item">este conteudo ocupa muito espaço</div>
        <div class="item">G</div>
    </div>
</body>
</html>
